<!DOCTYPE html><html lang=zh><head><meta charset=utf-8>
<script>(function(){var d=document.documentElement;var t=null,l=null;try{t=localStorage.getItem('pvzrh_theme');l=localStorage.getItem('pvzrh_lang')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';d.dataset.theme=t;d.dataset.lang=l||'zh';})();</script>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>PvZ RH Evolution Routes · PvZ RH 进化路线图</title>
<style>
:root{ color-scheme:light dark; --bg:#f6f6f3;--card:#fff;--tx:#222;--sub:#888;--acc:#3a8a3a;--cost:#c33;--in:#fdf6e6;--out:#e6f5fb;--evo:#f0e6f9;--route:#e6f5e6;--route2:#fef6e6;--arrow:#bbb;}
:root[data-theme="dark"]{--bg:#1a1a1c;--card:#2a2a2c;--tx:#eee;--sub:#aaa;--acc:#7ec97e;--cost:#f55;--in:#3a2c1a;--out:#1c2e3a;--evo:#2a1f3a;--route:#1f3a1f;--route2:#3a2a1c;--arrow:#555;}
body{margin:0;padding:1rem;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;}
header{position:sticky;top:0;background:var(--bg);padding:.5rem 0 .8rem;z-index:20;border-bottom:1px solid rgba(127,127,127,.18);margin-bottom:1rem;}
h1{margin:0;}
.titlebar{display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap;}
.themebtn{padding:.4rem .65rem;border:1px solid #ccc;border-radius:8px;background:var(--card);color:var(--tx);cursor:pointer;font-size:.95rem;line-height:1;min-width:2.6rem;text-align:center;}
.themebtn:hover{border-color:var(--acc);}
.btnbar{display:flex;gap:.4rem;align-items:center;}
.nav{margin:.3rem 0 .2rem;font-size:.9rem;}
.nav a{color:var(--acc);text-decoration:none;margin-right:.5rem;}
.nav a.active{font-weight:700;}
/* language-conditional show/hide. Children with .zh-only / .en-only respect data-lang. */
:root[data-lang="en"] .zh-only,:root[data-lang="zh"] .en-only{display:none !important;}
.meta{color:var(--sub);font-size:.9rem;margin:.4rem 0;}
.controls{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-top:.4rem;}
input[type=search]{padding:.55rem .9rem;border:1px solid #ccc;border-radius:8px;font-size:1rem;flex:1;min-width:220px;max-width:380px;background:var(--card);color:var(--tx);}
.viewbtns{display:inline-flex;border:1px solid #ccc;border-radius:8px;overflow:hidden;}
.viewbtns button{padding:.5rem .85rem;border:none;background:var(--card);color:var(--tx);cursor:pointer;font-size:.85rem;border-right:1px solid #ccc;}
.viewbtns button:last-child{border-right:none;}
.viewbtns button.on{background:var(--acc);color:#fff;font-weight:600;}
.toggle{padding:.5rem .85rem;border:1px solid #ccc;border-radius:8px;background:var(--card);color:var(--tx);cursor:pointer;font-size:.85rem;white-space:nowrap;}
.toggle.on{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:600;}
.loading{padding:2rem;text-align:center;color:var(--sub);}

.toc{display:flex;flex-wrap:wrap;gap:.4rem;margin:.5rem 0;}
.toc a{display:inline-block;padding:.25rem .55rem;background:rgba(127,127,127,.12);border-radius:6px;text-decoration:none;font-size:.82rem;color:var(--tx);}
.toc a:hover{background:rgba(58,138,58,.2);}
.base-plant{background:var(--card);margin:1.2rem 0;border-radius:14px;padding:1rem 1.1rem;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.base-plant h2{margin:0 0 .9rem;display:flex;align-items:center;gap:.5rem;}
.base-plant h2 img{width:48px;height:48px;object-fit:contain;background:rgba(127,127,127,.08);border-radius:8px;padding:3px;image-rendering:pixelated;}
.base-plant .zh-name{color:var(--sub);font-size:.85rem;font-weight:400;}
.route{background:var(--route);border-radius:10px;padding:.7rem;margin:.6rem 0;}
.route:nth-of-type(odd){background:var(--route2);}
.route .rname{font-weight:600;margin-bottom:.5rem;font-size:.95rem;}
.flow{display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;overflow-x:auto;padding-bottom:.3rem;}
.stage{flex:0 0 auto;background:var(--card);border-radius:10px;padding:.5rem .55rem;box-shadow:0 1px 3px rgba(0,0,0,.08);min-width:130px;max-width:160px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.stage img{width:84px;height:84px;object-fit:contain;image-rendering:pixelated;background:rgba(127,127,127,.08);border-radius:6px;padding:2px;}
.stage .nm{font-size:.78rem;font-weight:600;margin-top:.3rem;line-height:1.25;word-break:break-all;}
.stage .nm-zh{font-size:.72rem;color:var(--sub);}
.stage .stat{font-size:.7rem;color:var(--sub);margin-top:.3rem;line-height:1.4;}
.stage .stat b{color:var(--acc);font-weight:600;}
.stage .cost{font-size:.7rem;color:var(--cost);margin-top:.18rem;}
.arrow{flex:0 0 22px;font-size:1.3rem;color:var(--arrow);}
.no-img{display:flex;align-items:center;justify-content:center;width:84px;height:84px;background:rgba(127,127,127,.08);border-radius:6px;color:var(--sub);font-size:.65rem;}

</style></head><body>
<header><div class=titlebar><h1><span class=zh-only>🧬 PvZ RH 进化路线图</span><span class=en-only>🧬 PvZ RH Evolution Routes</span></h1>
<div class=btnbar>
<button id=langtoggle class=themebtn title="Switch language / 切换语言"><span class=zh-only>EN</span><span class=en-only>中</span></button>
<button id=themetoggle class=themebtn title="切换 浅色 / 深色 / Toggle theme">🌓</button>
</div></div>
<div class=nav><span class=zh-only><a href="plant_almanac_pro.html">📖 真·植物图鉴</a><a href="plant_fusion.html" class=active>🧬 进化路线</a><a href="plant_fusion_full.html">🔗 完整融合表</a></span><span class=en-only><a href="plant_almanac_pro.html">📖 Plant Almanac</a><a href="plant_fusion.html" class=active>🧬 Evolution Routes</a><a href="plant_fusion_full.html">🔗 Fusion Catalog</a></span></div>
<div class=meta id=meta></div>
<div class=controls id=controls></div>
</header>
<div id=root class=loading>加载中…</div>
<script>document.getElementById('themetoggle').addEventListener('click',function(){var r=document.documentElement;var cur=r.dataset.theme==='dark'?'light':'dark';r.dataset.theme=cur;try{localStorage.setItem('pvzrh_theme',cur)}catch(e){}});
document.getElementById('langtoggle')&&document.getElementById('langtoggle').addEventListener('click',function(){var r=document.documentElement;var cur=r.dataset.lang==='en'?'zh':'en';r.dataset.lang=cur;try{localStorage.setItem('pvzrh_lang',cur)}catch(e){}window.dispatchEvent(new CustomEvent('pvzrh:langchange',{detail:cur}));this.textContent=cur==='en'?'EN':'中';});</script>

<script src="data/evolution.js"></script>
<script>
const esc = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function isEN(){ return document.documentElement.dataset.lang==='en'; }
function pickName(meta){ if(!meta) return ''; return isEN() ? (meta.name_en||meta.name_zh||'') : (meta.name_zh||meta.name_en||''); }
const I18N_FUS={
  zh:{ meta:(n,r)=>`共 <b>${n}</b> 株底材植物 · <b>${r}</b> 条进化路线`,
       atk:'伤', hp:'血', spd:'速', cost:'升级', noimg:'(无图)' },
  en:{ meta:(n,r)=>`<b>${n}</b> base plants · <b>${r}</b> evolution routes`,
       atk:'DMG', hp:'HP', spd:'Atk', cost:'Upgrade', noimg:'(no image)' },
};
function L(){ return I18N_FUS[isEN()?'en':'zh']; }

(function(){
 try {
  const {plants} = window.PVZRH_EVOLUTION;
  document.getElementById('root').classList.remove('loading');
  const totalRoutes = plants.reduce((s,p)=>s+p.routes.length,0);
  const meta=document.getElementById('meta');
  function refreshMeta(){ meta.innerHTML = L().meta(plants.length, totalRoutes); }

  // toc
  const toc=document.createElement('div');
  toc.className='toc';
  document.getElementById('controls').appendChild(toc);
  function refreshToc(){
    toc.innerHTML = plants.map(p=>{
      const nm = pickName(p.base_meta) || p.key;
      return `<a href="#p-${esc(p.key)}">${esc(nm)}</a>`;
    }).join('');
  }

  const root=document.getElementById('root');
  let sectionsContainer;
  function render(){
    const t=L();
    const sections = plants.map(p=>{
      const nm = pickName(p.base_meta) || p.key;
      const sub = isEN() ? (p.base_meta?.name_zh||'') : '';
      const img = p.base_meta?.img;
      const head = `<h2>${img ? `<img src="${esc(img)}" alt="${esc(p.key)}">` : ''}${esc(nm)} <span class=zh-name>· ${esc(p.key)}${sub?' / '+esc(sub):''}</span></h2>`;
      const routes = p.routes.map(r=>{
        const stages = r.stages.map((s,i)=>{
          const arrow = i>0 ? '<span class=arrow>→</span>' : '';
          const sImg = s.img ? `<img loading=lazy src="${esc(s.img)}" alt="${esc(s.plantType)}">` : `<div class=no-img>${esc(t.noimg)}</div>`;
          const stat=[];
          if(s.attackDamage) stat.push(`${t.atk}<b>${s.attackDamage}</b>`);
          if(s.maxHealth)    stat.push(`${t.hp}<b>${s.maxHealth}</b>`);
          if(s.attackInterval) stat.push(`${t.spd}<b>${s.attackInterval}s</b>`);
          const cost = (r.stageCost && r.stageCost[i]!==undefined)
                         ? `<div class=cost>${t.cost} ☀${r.stageCost[i]}</div>` : '';
          const sNm = isEN() ? (s.name_en||s.plantType) : (s.name_zh||s.plantType);
          return arrow + `<div class=stage>${sImg}<div class=nm>${esc(s.plantType)}</div>${sNm && sNm!==s.plantType ? `<div class=nm-zh>${esc(sNm)}</div>` : ''}${stat.length?`<div class=stat>${stat.join(' · ')}</div>`:''}${cost}</div>`;
        }).join('');
        return `<div class=route><div class=rname>${esc(r.routeName)}</div><div class=flow>${stages}</div></div>`;
      }).join('');
      return `<section class=base-plant id="p-${esc(p.key)}">${head}${routes}</section>`;
    }).join('');
    if(sectionsContainer){ sectionsContainer.innerHTML = sections; }
    else {
      sectionsContainer = document.createElement('div');
      sectionsContainer.innerHTML = sections;
      root.replaceWith(sectionsContainer);
    }
  }
  refreshMeta(); refreshToc(); render();
  window.addEventListener('pvzrh:langchange', ()=>{ refreshMeta(); refreshToc(); render(); });
 } catch(e) {
  document.getElementById('root').innerHTML='<div style="color:#c33">加载 data/evolution.js 失败:'+esc(e.message)+'</div>';
 }
})();
</script>
</body></html>
